{% extends "base.html" %}

{% block title %} Kategoriyalar {% endblock title %}

{% block content %}
    <div class="container-fluid">
        <div class="container">
            <div class="row">
                {% for category in categories %}
                <div class="col-md-2">
                    <div class="card">
                        <div class="card-body">
                          <h5 class="card-title">{{category.titles}}</h5>
                         <a href="{% url 'category' category.id %}" class="btn btn-primary">Barcha postlari</a>
                        </div>
                      </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
{% endblock content %}
