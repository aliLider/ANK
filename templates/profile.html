<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Profile</title>

    
<style>
    
    h3{
        /* margin-left: 120px; */
        max-width: max-content;
        
    }
    body{
        background-image: url(https://wp-mktg.prod.getty1.net/istockcontentredesign/wp-content/uploads/sites/5/2021/03/2021_iStock_LatestBGTrends_Hero.jpg.jpeg);
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
       
    }
</style>

</head>
<body>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>

<div style="background-color: white; width: 800px; height: 350px; border: solid aqua 2px; border-radius: 40px; margin-left: 290px; margin-top: 100px;">
    <h1 class="text-center" style="margin-top: 20px; color: aqua;">Profile</h1>
    <a href="{% url 'home' %}"><img style="margin-left: 35px; margin-top: -70px; width: 30px; height: 30px;" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAYAAAAeP4ixAAAACXBIWXMAAAsTAAALEwEAmpwYAAAA8ElEQVR4nO3VsSsHQBTA8Q9CKClKLJjERrJJ/jYLZVUyS7JKTEShDGQTExYsGFhJveEXm4WX96k33XLf7q6jlFJKKaWU8l0/znEgsV5c4B1HkurGaURcxsmk0xlX6TPiGoMSasdORNxiWEKt2IqIe4xKqAUbEfGIcQk1Yy0injApoSasRMQLpiW1FBGvmJXUQkRknKPGkPk/sKGfzt7XU1mMhTfMSawJyw3vZEbymNWIecaUxFqw3vCXTEgesxkxDxiTWBu2I+YOIxLrwH7E3GBIYl04jJgrDEisB2cRcyy5Ppxg97c3UkoppZRSyv/2AYbUktLOk7McAAAAAElFTkSuQmCC"></a>

    <!-- <button class="btn btn-outline-info" style="margin-left: 347px;">Edit profile</button> -->
    <div style="margin-left: 120px; margin-top: 2px;">
        <h3 class="text-muted">Username: <span style="color: black;">{{user.username}}</span></h3>
        <h3 class="text-muted">Age: <span style="color: black;">{{user.age}}</span></h3>
        <h3 class="text-muted">Location: <span style="color: black;">{{user.address}}</span></h3>
        <h3 class="text-muted">Email: <span style="color: black;">{{user.email}}</span></h3>
        <a href="#" class="btn btn-outline-info" style="margin-left: 180px;">Edit Profile</a>
        <a class="btn btn-outline-danger" href="{% url 'logout' %}" style="margin-left: 0px;">Log Out</a>
        <p style="margin-left: -40px; margin-top: -200px; background-repeat: no-repeat; background-size: contain; width: 30px; height: 30px; background-image: url(https://cdn.icon-icons.com/icons2/3066/PNG/512/user_person_profile_avatar_icon_190943.png);"></p>
        <p style="margin-left: -38px; margin-top: 1px; background-repeat: no-repeat; background-size: contain; width: 25px; height: 25px; background-image: url(https://cdn-icons-png.flaticon.com/512/2370/2370264.png);"></p>
        <p style="margin-left: -38px; margin-top: 1px; background-repeat: no-repeat; background-size: contain; width: 25px; height: 25px;  background-image: url(https://leninfoservice.ru/wp-content/uploads/2020/04/word-image-2.png);"></p>
        <p style="margin-left: -38px; margin-top: 1px; background-repeat: no-repeat; background-size: contain; width: 25px; height: 25px; background-image: url(https://cdn.icon-icons.com/icons2/2153/PNG/512/mail_envelope_icon_132765.png);"></p>
    </div>
</div>

</body>
</html>
